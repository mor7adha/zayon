<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academy System — My Enrollments</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="card large">
        <div class="top-nav">
            <h2>⏱️ My Enrollments</h2>
            <a href="dashboard.html" class="back-btn">
                <span>🔙</span> Back to Dashboard
            </a>
        </div>
        
        <p class="subtitle" style="text-align: left;">Track your current training progress and payment statuses.</p>

        <table>
            <thead>
                <tr>
                    <th>Enrol ID</th>
                    <th>Program Name</th>
                    <th>Date</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="enrollmentsTableBody">
                <tr><td colspan="5">Loading your enrollments...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const tbody = document.getElementById('enrollmentsTableBody');
            
            try {
                const res = await fetch('/api/enrollments');
                if (res.status === 401) {
                    window.location.href = '/index.html';
                    return;
                }
                
                const enrollments = await res.json();
                
                if (enrollments.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">You have not enrolled in any programs yet.</td></tr>';
                    return;
                }
                
                tbody.innerHTML = '';
                
                enrollments.forEach(e => {
                    const tr = document.createElement('tr');
                    
                    let statusBadge = '';
                    let actionButton = '';
                    
                    if (e.status === 'Completed') {
                        statusBadge = '<span class="status-badge status-completed">Completed</span>';
                        actionButton = `<button class="btn btn-secondary" style="padding: 0.4rem 1rem;" onclick="handleAction(${e.enrollment_id}, '${e.name}', 'cert')">View Cert</button>`;
                    } else if (e.status === 'In Progress') {
                        statusBadge = '<span class="status-badge status-inprogress">In Progress</span>';
                        actionButton = `<button class="btn btn-secondary" style="padding: 0.4rem 1rem;" onclick="handleAction(${e.enrollment_id}, '${e.name}', 'pay')">Pay Fee</button>`;
                    } else {
                        statusBadge = '<span class="status-badge status-pending">Pending</span>';
                        actionButton = `<button class="btn" style="padding: 0.4rem 1rem;" onclick="handleAction(${e.enrollment_id}, '${e.name}', 'pay')">Pay Fee</button>`;
                    }
                    
                    tr.innerHTML = `
                        <td>${e.enrollment_id}</td>
                        <td>${e.name}</td>
                        <td>${e.enrollment_date}</td>
                        <td>${statusBadge}</td>
                        <td>${actionButton}</td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (err) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">Error loading enrollments.</td></tr>';
            }
        });

        function handleAction(id, courseName, actionType) {
            if (actionType === 'pay') {
                window.location.href = `/payment.html?id=${id}`;
            } else if (actionType === 'cert') {
                window.location.href = `/certificate.html?course=${encodeURIComponent(courseName)}`;
            }
        }
    </script>
</body>
</html>
