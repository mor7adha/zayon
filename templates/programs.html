<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academy System — Training Programs</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="card large">
        <div class="top-nav">
            <h2>📋 Training Programs</h2>
            <a href="dashboard.html" class="back-btn">
                <span>🔙</span> Back to Dashboard
            </a>
        </div>
        
        <p class="subtitle" style="text-align: left;">Browse and enroll in available training programs.</p>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Program Name</th>
                    <th>Type</th>
                    <th>Duration</th>
                    <th>Fees (SAR)</th>
                    <th>Start Date</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="programsTableBody">
                <!-- Data will be loaded here dynamically -->
                <tr><td colspan="7">Loading programs...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const mode = urlParams.get('mode');
            
            const tbody = document.getElementById('programsTableBody');
            
            try {
                const res = await fetch('/api/programs');
                const programs = await res.json();
                
                tbody.innerHTML = '';
                
                programs.forEach(p => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${p.id}</td>
                        <td>${p.name}</td>
                        <td>${p.type}</td>
                        <td>${p.duration}</td>
                        <td>${p.fee.toFixed(2)}</td>
                        <td>${p.start_date}</td>
                        <td class="action-cell">
                            <button class="btn btn-secondary" style="padding: 0.4rem 1rem;" onclick="handleEnroll(${p.id})">Enroll</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
                
            } catch (err) {
                tbody.innerHTML = '<tr><td colspan="7">Error loading programs.</td></tr>';
            }

            if (mode === 'view') {
                document.querySelector('h2').innerHTML = '📋 Available Training Programs';
                document.querySelector('.subtitle').textContent = 'Browse the list of available training programs. To enroll, go back and select "Enroll in a Program".';
                
                // Hide action column after data is loaded
                setTimeout(() => {
                    const ths = document.querySelectorAll('th');
                    if (ths.length > 0) ths[ths.length - 1].style.display = 'none';
                    document.querySelectorAll('.action-cell').forEach(td => td.style.display = 'none');
                }, 100);
            } else if (mode === 'enroll') {
                document.querySelector('h2').innerHTML = '✏️ Program Enrollment';
                document.querySelector('.subtitle').textContent = 'Select a program below and click Enroll to register.';
            }
        });
        
        async function handleEnroll(programId) {
            try {
                const res = await fetch('/api/enroll', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ program_id: programId })
                });
                const data = await res.json();
                
                if (data.success) {
                    alert('Successfully enrolled! Go to "My Enrollments" to view your status and pay fees.');
                } else {
                    alert(data.message || 'Error enrolling in program.');
                }
            } catch (err) {
                alert('Connection error.');
            }
        }
    </script>
</body>
</html>
