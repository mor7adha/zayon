<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificate of Completion</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background-color: #cbd5e1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            min-height: 100vh;
        }

        .cert-container {
            width: 100%;
            max-width: 950px;
            background: #fff;
            padding: 25px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            position: relative;
        }

        .cert-border {
            border: 10px solid var(--primary-color);
            padding: 50px 70px;
            text-align: center;
            position: relative;
            background: #fff url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" opacity="0.02" viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="none" stroke="%231954a6" stroke-width="3"/></svg>');
        }

        /* Decorative inner border */
        .cert-border::before {
            content: '';
            position: absolute;
            top: 6px; left: 6px; right: 6px; bottom: 6px;
            border: 2px solid #ca8a04;
            pointer-events: none;
        }

        /* Corner accents */
        .corner {
            position: absolute;
            width: 40px; height: 40px;
            border: 4px solid var(--primary-color);
        }
        .corner.tl { top: -14px; left: -14px; border-right: none; border-bottom: none; }
        .corner.tr { top: -14px; right: -14px; border-left: none; border-bottom: none; }
        .corner.bl { bottom: -14px; left: -14px; border-right: none; border-top: none; }
        .corner.br { bottom: -14px; right: -14px; border-left: none; border-top: none; }

        .cert-header {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .cert-subheader {
            font-family: 'Inter', sans-serif;
            font-size: 1.2rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 3rem;
        }

        .cert-text {
            font-size: 1.1rem;
            color: #475569;
            margin-bottom: 1.5rem;
            font-style: italic;
        }

        .cert-name {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid #cbd5e1;
            display: inline-block;
            padding: 0 3rem 0.5rem;
        }

        .cert-course {
            font-family: 'Inter', sans-serif;
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--primary-color);
            margin: 1.5rem 0 3.5rem;
            padding: 0.5rem 2rem;
            background: #f8fafc;
            border-radius: 8px;
            display: inline-block;
            border: 1px solid #e2e8f0;
        }

        .cert-footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-top: 2rem;
            padding: 0 2rem;
        }

        .cert-signature {
            text-align: center;
        }
        
        .signature-line {
            width: 220px;
            margin-bottom: 0.5rem;
        }

        .signature-text {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 500;
        }

        .cert-badge {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #facc15 0%, #a16207 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15), inset 0 0 0 4px #fff, inset 0 0 0 6px #ca8a04;
            position: relative;
        }
        .cert-badge::after {
            content: '★';
            font-size: 4rem;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        .controls {
            margin-top: 2rem;
            display: flex;
            gap: 1rem;
        }

        /* Print optimization */
        @media print {
            body {
                background: white;
                padding: 0;
                align-items: flex-start;
            }
            .controls {
                display: none;
            }
            .cert-container {
                box-shadow: none;
                max-width: 100%;
                padding: 0;
            }
            @page {
                size: landscape;
                margin: 1cm;
            }
        }
    </style>
</head>
<body>

    <div class="cert-container" id="printableArea">
        <div class="cert-border">
            <div class="corner tl"></div>
            <div class="corner tr"></div>
            <div class="corner bl"></div>
            <div class="corner br"></div>

            <h1 class="cert-header">Certificate</h1>
            <div class="cert-subheader">Of Completion</div>
            
            <p class="cert-text">This is to proudly certify that</p>
            <div class="cert-name">John Doe</div>
            
            <p class="cert-text">has successfully completed the training program in</p>
            <div class="cert-course" id="courseName">Training Course Name</div>
            
            <div class="cert-footer">
                <div class="cert-signature">
                    <div class="signature-line" style="font-family: 'Playfair Display', serif; font-size: 1.8rem; font-style: italic; color: #1e293b; padding-bottom: 5px; border-bottom: 2px solid #cbd5e1;">A. Director</div>
                    <div class="signature-text">Academy Director</div>
                </div>
                
                <div class="cert-badge"></div>
                
                <div class="cert-signature">
                    <div class="signature-line" id="dateDisplay" style="font-family: 'Inter', sans-serif; font-size: 1.2rem; font-weight: 500; color: #1e293b; padding-bottom: 12px; border-bottom: 2px solid #cbd5e1;">2024-01-01</div>
                    <div class="signature-text">Date of Issue</div>
                </div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="btn" onclick="window.print()" style="padding: 0.85rem 2rem;">🖨️ Print / Save PDF</button>
        <a href="enrollments.html" class="btn btn-secondary" style="text-decoration: none; display: flex; align-items: center;">🔙 Back to Enrollments</a>
    </div>

    <script>
        // Get Course Name from URL
        const urlParams = new URLSearchParams(window.location.search);
        const course = urlParams.get('course');
        
        if (course) {
            document.getElementById('courseName').textContent = course;
        }

        // Set Current Date dynamically
        const today = new Date();
        const formattedDate = today.toLocaleDateString('en-US', {
            year: 'numeric',
            month: 'long',
            day: 'numeric'
        });
        document.getElementById('dateDisplay').textContent = formattedDate;
    </script>
</body>
</html>
