<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academy System — Sign Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="card">
        <div class="header-center">
            <h1>Create a New Account</h1>
            <p class="subtitle">Join our training system</p>
        </div>
        
        <form id="signupForm">
            <div class="form-row">
                <div class="form-group">
                    <label for="firstName">First Name:</label>
                    <input type="text" id="firstName" required>
                </div>
                <div class="form-group">
                    <label for="lastName">Last Name:</label>
                    <input type="text" id="lastName" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="nationalId">National ID:</label>
                    <input type="text" id="nationalId" pattern="[0-9]{10}" title="Must be exactly 10 digits" required>
                </div>
                <div class="form-group">
                    <label for="phone">Phone (05XXXXXXXX):</label>
                    <input type="text" id="phone" pattern="^05[0-9]{8}$" required>
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email Address:</label>
                <input type="email" id="email" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="gender">Gender:</label>
                    <select id="gender" required>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="city">City:</label>
                    <input type="text" id="city" required>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password (min 6 chars):</label>
                <input type="password" id="password" minlength="6" required>
            </div>
            
            <div class="button-group">
                <a href="index.html" class="btn btn-secondary">Back to Login</a>
                <button type="submit" class="btn">Create Account</button>
            </div>
        </form>
    </div>
    <script>
        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const name = document.getElementById('firstName').value + ' ' + document.getElementById('lastName').value;
            
            const users = JSON.parse(localStorage.getItem('academy_users') || '[]');
            
            if (users.find(u => u.email === email)) {
                alert('This email is already registered! Please go to login.');
                return;
            }
            
            users.push({ email, password, name });
            localStorage.setItem('academy_users', JSON.stringify(users));
            
            alert('Account created successfully! You can now login.');
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
